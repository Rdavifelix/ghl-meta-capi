services:
  - type: web
    name: ghl-meta-capi
    env: node
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /health
    envVars:
      - key: META_PIXEL_ID
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_API_VERSION
        value: v18.0
      - key: EVENT_SOURCE_URL
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
